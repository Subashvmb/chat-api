apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chat-api
  template:
    metadata:
      labels:
        app: chat-api
    spec:
      containers:
      - name: chat-api
        image: subashvmb/chat-api:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        env:
        env:
        - name: ANTHROPIC_API_KEY
          value: "placeholder"
---
apiVersion: v1
kind: Service
metadata:
  name: chat-api
spec:
  selector:
    app: chat-api
  ports:
  - port: 80
    targetPort: 8000
  type: LoadBalancer